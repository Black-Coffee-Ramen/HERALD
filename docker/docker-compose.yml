services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: herald
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d herald"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - herald_net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - herald_net

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: uvicorn herald.api.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ..:/app
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - herald_net

  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: streamlit run dashboard/dashboard.py --server.port 8501 --server.address 0.0.0.0
    volumes:
      - ..:/app
    ports:
      - "8501:8501"
    env_file:
      - ../.env
    environment:
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - herald_net

  workers:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: python herald/monitoring/run_workers.py
    volumes:
      - ..:/app
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - herald_net

volumes:
  pgdata:
  redisdata:

networks:
  herald_net:
    driver: bridge
